global:
  scrape_interval: 15s    # frequency of checking of the metrics
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'fastapi'
    metrics_path: '/metrics'
    scheme: 'http'
    static_configs:
      - targets: ['app:8000']   # connects to the 'app' service in docker-compose

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
