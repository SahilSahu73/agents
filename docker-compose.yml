# Docker compose configurations that defines all services required to run the application
services:

  # PostgreSQL + pgvector Database
  db:
    image: pgvector/pgvector:pg16      # PostgreSQL 16 with pgvector extension enabled
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - monitoring

  # FastAPI Application Service
  app:
    build:
      context: .          # build the image from project root
      args:
        APP_ENV: ${APP_ENV:-development}     # Build-time environment
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app        # Hot-reload application code
      - ./logs:/app/logs      # persisting application logs
    env_file:
      - .env.${APP_ENV:-development}   # load environment specific variable
    environment:
      - APP_ENV=${APP_ENV:-development}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-supersecretkeythatshouldbechnagedforproduction}
    command:
      - /bin/bash
      - -lc
      - |
        if [ "${APP_ENV:-development}" = "development" ]; then
          exec /app/.venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
        else
          exec /app/.venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
        fi
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=5).getcode() == 200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: on-failure
    networks:
      - monitoring

  # Streamlit Frontend Service
  streamlit:
    build:
      context: .
      args:
        APP_ENV: ${APP_ENV:-development}
    command:
      - /app/.venv/bin/streamlit
      - run
      - /app/streamlit_app.py
      - --server.address=0.0.0.0
      - --server.port=8501
      - --server.runOnSave=true
      - --server.fileWatcherType=poll
    ports:
      - "8501:8501"
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
      - ./streamlit_app.py:/app/streamlit_app.py
    env_file:
      - .env.${APP_ENV:-development}
    environment:
      - APP_ENV=${APP_ENV:-development}
      - STREAMLIT_API_BASE_URL=http://app:8000/api/v1
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=5).getcode() == 200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: on-failure
    networks:
      - monitoring

  # Prometheus (Metrics Collection)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"      # Prometheus UI
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - monitoring
    restart: always

  # Grafana (Metrics Visualization)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - monitoring
    restart: always
  
  # cAdvisor (Container Metrics)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring
    restart: always

# network and volumes
networks:
  monitoring:
    driver: bridge

volumes:
  grafana-storage:        # persist Grafana dashboards & data
  postgres-data:          # persist PostgreSQL data
